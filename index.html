<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數量統計表 — 儀表板</title>
<script src="https://accounts.google.com/gsi/client" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }

  #login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 24px;
  }
  #login-screen h1 { font-size: 1.6rem; color: #1a73e8; }
  #login-screen p { color: #666; font-size: 0.9rem; }
  #login-error { color: #d93025; font-size: 0.85rem; display: none; }

  #dashboard { display: none; }

  header {
    background: #1a73e8; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.2rem; }
  header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
  header img { width: 32px; height: 32px; border-radius: 50%; }
  #btn-logout {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5);
    color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
  }

  .tab-bar {
    background: #fff; border-bottom: 2px solid #e0e0e0;
    display: flex; padding: 0 24px;
  }
  .tab-bar button {
    background: none; border: none; border-bottom: 3px solid transparent;
    padding: 12px 20px; font-size: 0.9rem; color: #666; cursor: pointer; margin-bottom: -2px;
  }
  .tab-bar button:hover { color: #1a73e8; }
  .tab-bar button.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }

  .filter-bar {
    background: #fff; padding: 12px 24px; display: flex; gap: 16px;
    align-items: center; flex-wrap: wrap; border-bottom: 1px solid #e0e0e0;
  }
  .filter-bar label { font-size: 0.85rem; color: #666; display: flex; flex-direction: column; gap: 2px; }
  .filter-bar select {
    padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 0.85rem; background: #fff; min-width: 100px;
  }
  #btn-refresh {
    margin-left: auto; background: #1a73e8; color: #fff; border: none;
    padding: 7px 18px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
  }
  #btn-refresh:hover { background: #1557b0; }
  #loading { font-size: 0.8rem; color: #1a73e8; display: none; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; padding: 20px 24px;
  }
  .kpi-card {
    background: #fff; border-radius: 8px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center;
  }
  .kpi-card .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
  .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #1a73e8; }

  .charts-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px; padding: 0 24px 24px;
  }
  .chart-card {
    background: #fff; border-radius: 8px; padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .chart-card h3 { font-size: 0.95rem; color: #555; margin-bottom: 16px; }
  .chart-card canvas { max-height: 280px; }

  .detail-section {
    margin: 0 24px 32px; background: #fff; border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden;
  }
  .detail-header {
    background: #1a73e8; color: #fff; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 600;
  }
  #detail-count {
    background: rgba(255,255,255,0.25); padding: 2px 10px;
    border-radius: 10px; font-size: 0.8rem; font-weight: normal;
  }
  .detail-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }
  table.detail { border-collapse: collapse; width: 100%; font-size: 0.82rem; }
  table.detail thead th {
    background: #e8f0fe; color: #1a56c4; padding: 9px 12px; text-align: left;
    position: sticky; top: 0; z-index: 1; white-space: nowrap;
    border-bottom: 2px solid #c5d8ff; font-weight: 600;
  }
  table.detail tbody td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  table.detail tbody tr:hover td { background: #f5f8ff; }
  table.detail tbody tr:nth-child(even) td { background: #fafbff; }
  table.detail tbody tr:nth-child(even):hover td { background: #f0f4ff; }
  .td-qty { text-align: right; font-weight: 600; color: #1a73e8; }
  .td-worktype { white-space: nowrap; }
  .td-remark { color: #888; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .no-data { padding: 32px; text-align: center; color: #aaa; font-size: 0.9rem; }

  /* ── 報表共用 ── */
  .report-section { padding: 20px 24px 40px; }
  .report-controls {
    background: #fff; border-radius: 8px; padding: 14px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .report-controls label { font-size: 0.85rem; color: #555; display: flex; align-items: center; gap: 6px; }
  .report-controls select {
    padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 0.85rem; background: #fff;
  }
  .rpt-date { margin-left: auto; font-size: 0.82rem; color: #888; }
  .rpt-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 700px) { .rpt-grid-2 { grid-template-columns: 1fr; } }
  .rpt-block { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 20px; }
  .rpt-title { background: #4472C4; color: #fff; padding: 10px 16px; font-size: 0.9rem; font-weight: 600; }
  .rpt-wrap { overflow-x: auto; }
  table.rpt { border-collapse: collapse; min-width: 100%; font-size: 0.82rem; }
  table.rpt th {
    background: #D0E4FF; color: #1a56c4; padding: 8px 12px; text-align: left;
    white-space: nowrap; border-bottom: 2px solid #a8c8ff; font-weight: 600;
  }
  table.rpt th.r { text-align: right; }
  table.rpt td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  table.rpt td.r { text-align: right; }
  table.rpt tr:hover td { background: #f5f8ff; }
  table.rpt tr:nth-child(even) td { background: #fafbff; }
  table.rpt tr.total td { background: #D0E4FF !important; font-weight: 600; }
  table.rpt .zero { color: #ccc; }
  .rpt-placeholder { padding: 40px; text-align: center; color: #aaa; font-size: 0.9rem; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  /* 摺疊 */
  .rpt-title { cursor: pointer; user-select: none; }
  .rpt-block.collapsed .rpt-wrap { display: none; }
  .toggle-arrow { font-size: 0.75em; margin-right: 6px; opacity: 0.85; }

  /* 日期選擇器 */
  .report-controls input[type="date"] {
    padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 0.85rem; background: #fff; color: #333;
  }
  .date-sep { color: #888; font-size: 0.9rem; padding: 0 4px; }

  /* 共用篩選列 */
  .report-filter-bar {
    background: #fff; padding: 10px 24px; display: flex;
    gap: 12px; align-items: center; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
  }
  .rpt-filter-wrap { position: relative; }
  .rpt-filter-btn {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    border: 1px solid #ccc; border-radius: 4px; background: #fff;
    cursor: pointer; font-size: 0.85rem; white-space: nowrap;
  }
  .rpt-filter-btn:hover { border-color: #1a73e8; color: #1a73e8; }
  .filter-badge {
    background: #e8f0fe; color: #1a73e8;
    border-radius: 10px; padding: 1px 8px; font-size: 0.75rem; font-weight: 600;
  }
  .filter-badge.partial { background: #fff3e0; color: #f57c00; }
  .rpt-filter-panel {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 200;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); min-width: 220px; overflow: hidden;
  }
  .panel-search {
    display: flex; gap: 6px; padding: 8px 10px; border-bottom: 1px solid #f0f0f0;
  }
  .panel-search input {
    flex: 1; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 0.82rem; outline: none;
  }
  .panel-search input:focus { border-color: #1a73e8; }
  .reset-btn {
    padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 0.8rem; white-space: nowrap;
  }
  .reset-btn:hover { border-color: #ea4335; color: #ea4335; }
  .panel-header { border-bottom: 1px solid #f0f0f0; }
  .panel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; font-size: 0.82rem; cursor: pointer;
  }
  .panel-item:hover { background: #f5f8ff; }
  .panel-item input[type="checkbox"] { cursor: pointer; flex-shrink: 0; }
  .rpt-panel-list { max-height: 220px; overflow-y: auto; }
  .p-code { color: #999; font-size: 0.78rem; min-width: 62px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>數量統計表 儀表板</h1>
  <p>請使用公司 Google 帳號（@eup.com.tw）登入</p>
  <div id="g_id_onload"
    data-client_id="49182385706-hk1m4hqvlb224df35bbast88kk1baphq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard" data-size="large" data-theme="outline"
    data-text="sign_in_with" data-shape="rectangular" data-locale="zh-TW">
  </div>
  <p id="login-error">❌ 僅限 @eup.com.tw 帳號存取</p>
</div>

<div id="dashboard">
  <header>
    <h1>數量統計表 儀表板</h1>
    <div class="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
      <button id="btn-logout" onclick="logout()">登出</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="active" data-tab="dashboard" onclick="switchTab('dashboard')">儀表板</button>
    <button data-tab="monthly" onclick="switchTab('monthly')">月報</button>
    <button data-tab="weekly" onclick="switchTab('weekly')">周報</button>
  </div>

  <!-- 儀表板 -->
  <div id="tab-dashboard">
    <div class="filter-bar">
      <label>月份<select id="filter-month"><option value="">全部</option></select></label>
      <label>週別<select id="filter-week"><option value="">全部</option></select></label>
      <label>人員<select id="filter-person"><option value="">全部</option></select></label>
      <label>作業類型<select id="filter-worktype"><option value="">全部</option></select></label>
      <button id="btn-refresh" onclick="loadData()">重新整理</button>
      <span id="loading">載入中…</span>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">總筆數</div><div class="value" id="kpi-total">—</div></div>
      <div class="kpi-card"><div class="label">總數量</div><div class="value" id="kpi-qty">—</div></div>
      <div class="kpi-card"><div class="label">人員數</div><div class="value" id="kpi-persons">—</div></div>
      <div class="kpi-card"><div class="label">作業類型數</div><div class="value" id="kpi-wtypes">—</div></div>
      <div class="kpi-card"><div class="label">最後更新</div><div class="value" style="font-size:1rem" id="kpi-updated">—</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><h3>各人員產出（數量）</h3><canvas id="chart-person"></canvas></div>
      <div class="chart-card"><h3>作業類型分布</h3><canvas id="chart-worktype"></canvas></div>
      <div class="chart-card"><h3>每月趨勢</h3><canvas id="chart-monthly"></canvas></div>
      <div class="chart-card"><h3>品項類型分布</h3><canvas id="chart-itemtype"></canvas></div>
    </div>
    <div class="detail-section">
      <div class="detail-header">明細記錄<span id="detail-count">0 筆</span></div>
      <div class="detail-wrap">
        <table class="detail">
          <thead><tr><th>日期</th><th>人員</th><th>作業類型</th><th>品號</th><th>品名</th><th style="text-align:right">數量</th><th>備註</th></tr></thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 月報 -->
  <div id="tab-monthly" style="display:none">
    <div class="report-section">
      <div class="report-controls">
        <label>開始日期<input type="date" id="rpt-m-start" onchange="renderMonthlyReport()"></label>
        <span class="date-sep">～</span>
        <label>結束日期<input type="date" id="rpt-m-end" onchange="renderMonthlyReport()"></label>
        <div id="m-filter-slot" style="display:contents"></div>
        <span class="rpt-date" id="rpt-m-today"></span>
      </div>
      <div id="rpt-m-body"><div class="rpt-placeholder">請選擇開始與結束日期</div></div>
    </div>
  </div>

  <!-- 周報 -->
  <div id="tab-weekly" style="display:none">
    <div class="report-section">
      <div class="report-controls">
        <label>開始日期<input type="date" id="rpt-w-start" onchange="renderWeeklyReport()"></label>
        <span class="date-sep">～</span>
        <label>結束日期<input type="date" id="rpt-w-end" onchange="renderWeeklyReport()"></label>
        <div id="w-filter-slot" style="display:contents"></div>
        <span class="rpt-date" id="rpt-w-today"></span>
      </div>
      <div id="rpt-w-body"><div class="rpt-placeholder">請選擇開始與結束日期</div></div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGchUIstRTZJY9Auka_K9CAfGpx6a5MoiPC2bIQfHkhMBSy1pwHlvflzbSBY3DDSsZ/exec';
const ALLOWED_DOMAIN = 'eup.com.tw';
const WTYPES = ['成品','送修','修還','進貨','出貨','整新','檢測','環保送審','合格證','回廠','回廠-異常'];
const PEOPLE = ['Jenny','Kevin','Neil','van','Brian','阿昌','Gino','Mandy','Homejay'];
const COLORS_10 = ['#4285f4','#ea4335','#fbbc04','#34a853','#ff6d00','#46bdc6','#9c27b0','#e91e63','#00bcd4','#8bc34a'];
const COLORS_6  = ['#4285f4','#34a853','#fbbc04','#ea4335','#9c27b0','#ff6d00'];

let allData = [];
let charts = {};

// ── 登入 ──
function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  const email = payload.email || '';
  if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('user-name').textContent = payload.name;
  document.getElementById('user-avatar').src = payload.picture;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function logout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';
}

// ── Tab ──
let activeReportTab = null;
function switchTab(tab) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-bar button[data-tab="${tab}"]`).classList.add('active');
  ['dashboard','monthly','weekly'].forEach(id =>
    document.getElementById('tab-' + id).style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  activeReportTab = (tab === 'monthly' || tab === 'weekly') ? tab : null;
}

// ── 載入資料 ──
async function loadData() {
  document.getElementById('loading').style.display = 'inline';
  document.getElementById('btn-refresh').disabled = true;
  try {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    allData = json.data.map(r => ({
      date:        String(r['日期'] || '').substring(0, 10),
      week:        Number(r['週別']) || 0,
      month:       String(r['月份'] || ''),
      year:        String(r['年份'] || ''),
      person:      String(r['人員'] || ''),
      workType:    String(r['作業類型'] || ''),
      itemType:    String(r['品項類型'] || ''),
      productCode: String(r['品號'] || ''),
      productName: String(r['品名'] || ''),
      qty:         Number(r['數量']) || 0,
      remark:      String(r['備註'] || ''),
    })).filter(r => r.date);
    populateFilters();
    initProductList();
    render();
    const now = new Date();
    const dateStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
    document.getElementById('rpt-m-today').textContent = '製表日期：' + dateStr;
    document.getElementById('rpt-w-today').textContent = '製表日期：' + dateStr;
    document.getElementById('kpi-updated').textContent =
      now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    alert('載入失敗：' + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-refresh').disabled = false;
  }
}

// 日期字串工具（避免時區問題，一律用中午時間）
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().substring(0, 10);
}
function dateLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return (d.getMonth() + 1) + '/' + d.getDate();
}
function dayOfWeek(dateStr) {
  return new Date(dateStr + 'T12:00:00').getDay(); // 0=日 1=一 ... 6=六
}

// 摺疊切換
function toggleBlock(el) {
  const block = el.closest('.rpt-block');
  block.classList.toggle('collapsed');
  const arrow = el.querySelector('.toggle-arrow');
  if (arrow) arrow.textContent = block.classList.contains('collapsed') ? '▶' : '▼';
}

// ── 儀表板篩選 ──
function populateFilters() {
  const months  = [...new Set(allData.map(r => r.month).filter(Boolean))].sort((a,b) => Number(a)-Number(b));
  const persons = [...new Set(allData.map(r => r.person).filter(Boolean))].sort();
  const wtypes  = [...new Set(allData.map(r => r.workType).filter(Boolean))].sort();
  fillSelect('filter-month',    months,  m => `${m} 月`);
  fillSelect('filter-person',   persons);
  fillSelect('filter-worktype', wtypes);
  populateWeeks(allData);
}

function populateWeeks(data) {
  const weeks = [...new Set(data.map(r => r.week).filter(Boolean))].sort((a,b) => a-b);
  const cur = document.getElementById('filter-week').value;
  fillSelect('filter-week', weeks, w => `第 ${w} 週`);
  if (weeks.includes(Number(cur))) document.getElementById('filter-week').value = cur;
}

function fillSelect(id, values, labelFn) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部</option>';
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = labelFn ? labelFn(v) : v;
    sel.appendChild(opt);
  });
  sel.value = cur;
}

function getFiltered() {
  const m  = document.getElementById('filter-month').value;
  const wk = document.getElementById('filter-week').value;
  const p  = document.getElementById('filter-person').value;
  const w  = document.getElementById('filter-worktype').value;
  return allData.filter(r =>
    (!m  || r.month    === m) &&
    (!wk || r.week     === Number(wk)) &&
    (!p  || r.person   === p) &&
    (!w  || r.workType === w)
  );
}

// 點擊面板外部時關閉
document.addEventListener('click', e => {
  if (!e.target.closest('.rpt-filter-wrap')) closeAllPanels();
});

document.getElementById('filter-month').addEventListener('change', () => {
  const m = document.getElementById('filter-month').value;
  populateWeeks(m ? allData.filter(r => r.month === m) : allData);
  document.getElementById('filter-week').value = '';
  render();
});
['filter-week','filter-person','filter-worktype'].forEach(id =>
  document.getElementById(id).addEventListener('change', render));

// ── 儀表板渲染 ──
function render() {
  const data = getFiltered();
  document.getElementById('kpi-total').textContent   = data.length.toLocaleString();
  document.getElementById('kpi-qty').textContent     = data.reduce((s,r) => s+r.qty, 0).toLocaleString();
  document.getElementById('kpi-persons').textContent = new Set(data.map(r=>r.person).filter(Boolean)).size;
  document.getElementById('kpi-wtypes').textContent  = new Set(data.map(r=>r.workType)).size;
  drawBar('chart-person',   groupSum(data,'person'),   '數量', COLORS_10);
  drawPie('chart-worktype', groupSum(data,'workType'),  COLORS_10);
  drawLine('chart-monthly', groupMonthly(data));
  drawPie('chart-itemtype', groupSum(data,'itemType'),  COLORS_6);
  renderDetailTable(data);
}

function renderDetailTable(data) {
  const tbody = document.getElementById('detail-tbody');
  document.getElementById('detail-count').textContent = `${data.length.toLocaleString()} 筆`;
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="no-data">沒有符合條件的記錄</td></tr>`;
    return;
  }
  const sorted = [...data].sort((a,b) => b.date.localeCompare(a.date));
  tbody.innerHTML = sorted.map(r => `
    <tr>
      <td>${esc(r.date)}</td>
      <td>${esc(r.person) || '<span style="color:#bbb">—</span>'}</td>
      <td class="td-worktype">${esc(r.workType)}</td>
      <td style="color:#888">${esc(r.productCode)}</td>
      <td>${esc(r.productName)}</td>
      <td class="td-qty">${r.qty.toLocaleString()}</td>
      <td class="td-remark" title="${esc(r.remark)}">${esc(r.remark) || ''}</td>
    </tr>`).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 篩選狀態 ──
let filterPersons   = null;   // null=全部, Set=選擇的人
let filterWorkTypes = null;   // null=全部, Set=選擇的作業類型
let filterItemTypes = null;   // null=全部, Set=選擇的品項類型
let filterProducts  = null;   // null=全部, Set<productKey>
let allProductList  = [];
let allWorkTypeList = [];
let allItemTypeList = [];
const LS_KEY = 'eup-qty-products';

function productKey(r) { return (r.productCode||'')+'||'+(r.productName||''); }
function escAttr(s)    { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getFilterState(t){ return t==='person'?filterPersons:t==='wtype'?filterWorkTypes:t==='itype'?filterItemTypes:filterProducts; }
function setFilterState(t,v){ if(t==='person')filterPersons=v;else if(t==='wtype')filterWorkTypes=v;else if(t==='itype')filterItemTypes=v;else filterProducts=v; }
function getItemList(t){ return t==='person'?PEOPLE:t==='wtype'?allWorkTypeList:t==='itype'?allItemTypeList:[]; }

function initProductList() {
  const sP=new Set(),sW=new Set(),sI=new Set();
  allProductList=[]; allWorkTypeList=[]; allItemTypeList=[];
  allData.forEach(r=>{
    const k=productKey(r);
    if(!sP.has(k)&&(r.productCode||r.productName)){sP.add(k);allProductList.push({key:k,code:r.productCode||'',name:r.productName||''});}
    if(r.workType&&!sW.has(r.workType)){sW.add(r.workType);allWorkTypeList.push(r.workType);}
    if(r.itemType&&!sI.has(r.itemType)){sI.add(r.itemType);allItemTypeList.push(r.itemType);}
  });
  allProductList.sort((a,b)=>a.code.localeCompare(b.code)||a.name.localeCompare(b.name));
  allWorkTypeList.sort(); allItemTypeList.sort();
  try{
    const saved=JSON.parse(localStorage.getItem(LS_KEY));
    if(Array.isArray(saved)&&saved.length>0){
      const valid=saved.filter(k=>allProductList.some(p=>p.key===k));
      if(valid.length>0&&valid.length<allProductList.length) filterProducts=new Set(valid);
    }
  }catch(e){}
  ['m','w'].forEach(injectFilterControls);
  updateFilterBadges();
}

function injectFilterControls(p) {
  const slot=document.getElementById(p+'-filter-slot'); if(!slot) return;
  slot.innerHTML=
    mkListFilter(p,'person','\u{1F464}','人員')+
    mkListFilter(p,'wtype','\u{1F4CB}','作業類型')+
    mkListFilter(p,'itype','\u{1F3F7}️','品項類型')+
    mkProductFilter(p);
}
function mkListFilter(p,type,em,label){
  return '<div class="rpt-filter-wrap">'
    +'<button class="rpt-filter-btn" onclick="toggleFP(\''+p+'\',\''+type+'\')"> '
    +em+' '+label+' <span class="filter-badge" id="'+p+'-'+type+'-badge">全部</span></button>'
    +'<div class="rpt-filter-panel" id="'+p+'-'+type+'-panel" style="display:none">'
    +'<div class="panel-header"><label class="panel-item">'
    +'<input type="checkbox" id="'+p+'-'+type+'-all" checked onchange="onAllChange(\''+p+'\',\''+type+'\',this)"> 全部'
    +'</label></div>'
    +'<div id="'+p+'-'+type+'-list" class="rpt-panel-list"></div>'
    +'</div></div>';
}
function mkProductFilter(p){
  return '<div class="rpt-filter-wrap">'
    +'<button class="rpt-filter-btn" onclick="toggleFP(\''+p+'\',\'product\')">'
    +'\u{1F4E6} 品項 <span class="filter-badge" id="'+p+'-product-badge">全部</span></button>'
    +'<div class="rpt-filter-panel" id="'+p+'-product-panel" style="display:none">'
    +'<div class="panel-search">'
    +'<input type="text" id="'+p+'-product-search" placeholder="\u{1F50D} 搜尋品號/品名" oninput="onProductSearch(\''+p+'\',this.value)">'
    +'<button class="reset-btn" onclick="resetProductFilter()">重設</button>'
    +'</div>'
    +'<div class="panel-header"><label class="panel-item">'
    +'<input type="checkbox" id="'+p+'-product-all" onchange="onProductAllChange(\''+p+'\',this)">'
    +'全部（<span id="'+p+'-product-total">0</span> 項）'
    +'</label></div>'
    +'<div id="'+p+'-product-list" class="rpt-panel-list"></div>'
    +'</div></div>';
}

function getFilteredData(start, end) {
  let d=allData.filter(r=>r.date>=start&&r.date<=end);
  if(filterPersons  !==null) d=d.filter(r=>filterPersons.has(r.person));
  if(filterWorkTypes!==null) d=d.filter(r=>filterWorkTypes.has(r.workType));
  if(filterItemTypes!==null) d=d.filter(r=>filterItemTypes.has(r.itemType));
  if(filterProducts !==null) d=d.filter(r=>filterProducts.has(productKey(r)));
  return d;
}

function rerender() {
  if(activeReportTab==='monthly') renderMonthlyReport();
  else if(activeReportTab==='weekly') renderWeeklyReport();
}

function toggleFP(prefix, type) {
  const panel=document.getElementById(prefix+'-'+type+'-panel'); if(!panel) return;
  const open=panel.style.display!=='none';
  closeAllPanels();
  if(!open){
    const sq=document.getElementById(prefix+'-product-search');
    if(type==='product') renderProductPanel(prefix, sq?sq.value:'');
    else renderListPanel(prefix, type);
    panel.style.display='block';
  }
}
function closeAllPanels(){document.querySelectorAll('.rpt-filter-panel').forEach(p=>p.style.display='none');}

function renderListPanel(prefix, type) {
  const items=getItemList(type), state=getFilterState(type), allSel=state===null;
  const allCb=document.getElementById(prefix+'-'+type+'-all');
  if(allCb){allCb.checked=allSel;allCb.indeterminate=!allSel&&state.size>0;}
  const list=document.getElementById(prefix+'-'+type+'-list');
  if(list) list.innerHTML=items.map(function(item){
    return '<label class="panel-item"><input type="checkbox" class="'+prefix+'-'+type+'-cb" value="'+escAttr(item)+'"'
      +((allSel||(state&&state.has(item)))?' checked':'')
      +' onchange="onItemChange(\''+prefix+'\',\''+type+'\')">'
      +esc(item)+'</label>';
  }).join('');
}

function onItemChange(prefix, type) {
  const items=getItemList(type);
  const cbs=[...document.querySelectorAll('.'+prefix+'-'+type+'-cb')];
  const checked=cbs.filter(cb=>cb.checked).map(cb=>cb.value);
  const allCb=document.getElementById(prefix+'-'+type+'-all');
  if(checked.length===0){
    cbs.forEach(cb=>cb.checked=true); setFilterState(type,null);
    if(allCb){allCb.checked=true;allCb.indeterminate=false;}
  } else if(checked.length===items.length){
    setFilterState(type,null);
    if(allCb){allCb.checked=true;allCb.indeterminate=false;}
  } else {
    setFilterState(type,new Set(checked));
    if(allCb){allCb.checked=false;allCb.indeterminate=true;}
  }
  updateFilterBadges(); rerender();
}

function onAllChange(prefix, type, el) {
  document.querySelectorAll('.'+prefix+'-'+type+'-cb').forEach(cb=>cb.checked=true);
  el.checked=true; el.indeterminate=false;
  setFilterState(type,null);
  updateFilterBadges(); rerender();
}

function renderProductPanel(prefix, query) {
  const total=allProductList.length, allSel=filterProducts===null;
  const allCb=document.getElementById(prefix+'-product-all');
  const totEl=document.getElementById(prefix+'-product-total');
  if(totEl) totEl.textContent=total;
  if(allCb){allCb.checked=allSel;allCb.indeterminate=!allSel&&filterProducts.size>0;}
  const q=(query||'').toLowerCase();
  const vis=q?allProductList.filter(p=>p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)):allProductList;
  const list=document.getElementById(prefix+'-product-list');
  if(list) list.innerHTML=vis.map(function(p){
    return '<label class="panel-item"><input type="checkbox" class="'+prefix+'-product-cb" data-key="'+escAttr(p.key)+'"'
      +((allSel||(filterProducts&&filterProducts.has(p.key)))?' checked':'')
      +' onchange="onProductChange(\''+prefix+'\')">'
      +'<span class="p-code">'+esc(p.code)+'</span>'+esc(p.name)+'</label>';
  }).join('');
}

function onProductSearch(prefix, q){ renderProductPanel(prefix, q); }

function onProductChange(prefix) {
  const allKeys=new Set(allProductList.map(p=>p.key));
  const vcbs=[...document.querySelectorAll('.'+prefix+'-product-cb')];
  const vKeys=new Set(vcbs.map(cb=>cb.dataset.key));
  const chk=new Set(vcbs.filter(cb=>cb.checked).map(cb=>cb.dataset.key));
  let ns=filterProducts?new Set(filterProducts):new Set(allKeys);
  vKeys.forEach(k=>{if(chk.has(k))ns.add(k);else ns.delete(k);});
  if(ns.size===0) ns=new Set(allKeys);
  filterProducts=ns.size===allKeys.size?null:ns;
  saveProductFilter();
  const sq=document.getElementById(prefix+'-product-search');
  renderProductPanel(prefix, sq?sq.value:'');
  updateFilterBadges(); rerender();
}

function onProductAllChange(prefix, el) {
  document.querySelectorAll('.'+prefix+'-product-cb').forEach(cb=>cb.checked=true);
  el.checked=true; el.indeterminate=false; filterProducts=null;
  saveProductFilter(); updateFilterBadges(); rerender();
}

function resetProductFilter() {
  filterProducts=null;
  ['m','w'].forEach(t=>{
    const s=document.getElementById(t+'-product-search'); if(s) s.value='';
    const p=document.getElementById(t+'-product-panel');
    if(p&&p.style.display!=='none') renderProductPanel(t,'');
  });
  saveProductFilter(); updateFilterBadges(); rerender();
}

function saveProductFilter() {
  try{localStorage.setItem(LS_KEY,JSON.stringify(filterProducts?[...filterProducts]:null));}catch(e){}
}

function updateFilterBadges() {
  ['m','w'].forEach(t=>{
    setBadge(t+'-person-badge',  filterPersons,   PEOPLE.length,         '人');
    setBadge(t+'-wtype-badge',   filterWorkTypes, allWorkTypeList.length, '類');
    setBadge(t+'-itype-badge',   filterItemTypes, allItemTypeList.length, '類');
    setProductBadge(t+'-product-badge');
  });
}
function setBadge(id,state,total,unit){
  const el=document.getElementById(id); if(!el) return;
  if(state===null){el.textContent='全部';el.className='filter-badge';}
  else{el.textContent=state.size+'/'+total+' '+unit;el.className='filter-badge partial';}
}
function setProductBadge(id){
  const el=document.getElementById(id); if(!el) return;
  if(filterProducts===null){el.textContent='全部';el.className='filter-badge';}
  else{el.textContent=filterProducts.size+'/'+allProductList.length;el.className='filter-badge partial';}
}

);
}

// ── 月報 ──
function renderMonthlyReport() {
  const start = document.getElementById('rpt-m-start').value;
  const end   = document.getElementById('rpt-m-end').value;
  const body  = document.getElementById('rpt-m-body');
  if (!start || !end || start > end) { body.innerHTML = '<div class="rpt-placeholder">請選擇開始與結束日期</div>'; return; }
  const data = getFilteredData(start, end);
  body.innerHTML = buildBlock12(data) + buildBlock3(data) + buildBlock4Monthly(data, start, end);
}

// ── 周報 ──
function renderWeeklyReport() {
  const start = document.getElementById('rpt-w-start').value;
  const end   = document.getElementById('rpt-w-end').value;
  const body  = document.getElementById('rpt-w-body');
  if (!start || !end || start > end) { body.innerHTML = '<div class="rpt-placeholder">請選擇開始與結束日期</div>'; return; }
  const data = getFilteredData(start, end);
  body.innerHTML = buildBlock12(data) + buildBlock3(data) + buildBlock4Weekly(data, start, end);
}

// ① ② 並排
function buildBlock12(data) {
  return `<div class="rpt-grid-2">${buildBlock1(data)}${buildBlock2(data)}</div>`;
}

// ① 作業類型彙總
function buildBlock1(data) {
  const map = {};
  data.forEach(r => { if (r.workType) map[r.workType] = (map[r.workType]||0) + r.qty; });
  const rows = Object.entries(map).sort((a,b) => b[1]-a[1]);
  const total = rows.reduce((s,[,v]) => s+v, 0);
  const body = rows.map(([k,v]) =>
    `<tr><td>${esc(k)}</td><td class="r">${v.toLocaleString()}</td></tr>`
  ).join('') + `<tr class="total"><td>合計</td><td class="r">${total.toLocaleString()}</td></tr>`;
  return `<div class="rpt-block">
    <div class="rpt-title" onclick="toggleBlock(this)"><span class="toggle-arrow">▼</span>① 作業類型彙總</div>
    <div class="rpt-wrap"><table class="rpt">
      <thead><tr><th>作業類型</th><th class="r">數量</th></tr></thead>
      <tbody>${rows.length ? body : noDataRow(2)}</tbody>
    </table></div></div>`;
}

// ② 品項類型彙總
function buildBlock2(data) {
  const map = {};
  data.forEach(r => {
    if (!r.itemType) return;
    if (!map[r.itemType]) map[r.itemType] = {qty:0, cnt:0};
    map[r.itemType].qty += r.qty; map[r.itemType].cnt++;
  });
  const rows = Object.entries(map).sort((a,b) => b[1].qty-a[1].qty);
  const tQty = rows.reduce((s,[,v]) => s+v.qty, 0);
  const tCnt = rows.reduce((s,[,v]) => s+v.cnt, 0);
  const body = rows.map(([k,v]) =>
    `<tr><td>${esc(k)}</td><td class="r">${v.qty.toLocaleString()}</td><td class="r">${v.cnt.toLocaleString()}</td></tr>`
  ).join('') + `<tr class="total"><td>合計</td><td class="r">${tQty.toLocaleString()}</td><td class="r">${tCnt.toLocaleString()}</td></tr>`;
  return `<div class="rpt-block">
    <div class="rpt-title" onclick="toggleBlock(this)"><span class="toggle-arrow">▼</span>② 品項類型彙總</div>
    <div class="rpt-wrap"><table class="rpt">
      <thead><tr><th>品項類型</th><th class="r">數量</th><th class="r">筆數</th></tr></thead>
      <tbody>${rows.length ? body : noDataRow(3)}</tbody>
    </table></div></div>`;
}

// ③ 各人員作業量
function buildBlock3(data) {
  const persons = filterPersons !== null ? PEOPLE.filter(p => filterPersons.has(p)) : PEOPLE;
  const matrix = {};
  const pTot = {}, wTot = {};
  persons.forEach(p => { matrix[p] = {}; pTot[p] = 0; WTYPES.forEach(wt => matrix[p][wt] = 0); });
  WTYPES.forEach(wt => wTot[wt] = 0);
  data.forEach(r => {
    if (matrix[r.person] !== undefined && r.workType in matrix[r.person]) {
      matrix[r.person][r.workType] += r.qty;
      pTot[r.person] += r.qty;
      wTot[r.workType] += r.qty;
    }
  });
  const grand = persons.reduce((s,p) => s + pTot[p], 0);
  const thCols = WTYPES.map(wt => `<th class="r">${esc(wt)}</th>`).join('');
  const dataRows = persons.map(p => {
    const cells = WTYPES.map(wt => {
      const v = matrix[p][wt];
      return `<td class="r${v===0?' zero':''}">${v===0?'—':v.toLocaleString()}</td>`;
    }).join('');
    return `<tr><td>${esc(p)}</td>${cells}<td class="r" style="font-weight:600">${pTot[p].toLocaleString()}</td></tr>`;
  }).join('');
  const totCells = WTYPES.map(wt => `<td class="r">${wTot[wt]===0?'—':wTot[wt].toLocaleString()}</td>`).join('');
  return `<div class="rpt-block">
    <div class="rpt-title" onclick="toggleBlock(this)"><span class="toggle-arrow">▼</span>③ 各人員作業量（9人 × 11作業類型）</div>
    <div class="rpt-wrap"><table class="rpt">
      <thead><tr><th>人員</th>${thCols}<th class="r">合計</th></tr></thead>
      <tbody>${dataRows}<tr class="total"><td>合計</td>${totCells}<td class="r">${grand.toLocaleString()}</td></tr></tbody>
    </table></div></div>`;
}

// 計算日期範圍內的 Mon-Fri 工作週清單
function getWorkWeeksInRange(startDate, endDate) {
  const weeks = [];
  // 找第一個週一（>= startDate）
  let mon = startDate;
  const dow = dayOfWeek(mon);
  if (dow !== 1) mon = addDays(mon, dow === 0 ? 1 : 8 - dow);
  let n = 1;
  while (mon <= endDate) {
    const fri = addDays(mon, 4);
    const wkEnd = fri < endDate ? fri : endDate;
    weeks.push({ start: mon, end: wkEnd, label: `第${n}週<br><span style="font-weight:normal;font-size:0.85em">${dateLabel(mon)}~${dateLabel(wkEnd)}</span>` });
    mon = addDays(mon, 7);
    n++;
  }
  return weeks;
}

// ④ 月報：週別細項（依日期範圍動態計算工作週）
function buildBlock4Monthly(data, startDate, endDate) {
  const weeks = getWorkWeeksInRange(startDate, endDate);
  const map = {};
  data.forEach(r => {
    const key = `${r.productCode}\0${r.productName}\0${r.workType}`;
    if (!map[key]) {
      map[key] = {productCode:r.productCode, productName:r.productName, workType:r.workType, total:0, byWeek:{}};
      weeks.forEach((_,i) => map[key].byWeek[i] = 0);
    }
    map[key].total += r.qty;
    weeks.forEach((wk, i) => { if (r.date >= wk.start && r.date <= wk.end) map[key].byWeek[i] += r.qty; });
  });
  const rows = Object.values(map).sort((a,b) => b.total-a.total);
  const thCols = weeks.map(wk => `<th class="r">${wk.label}</th>`).join('');
  const colCount = 4 + weeks.length;
  const body = rows.map(row => {
    const wCells = weeks.map((_,i) => {
      const v = row.byWeek[i];
      return `<td class="r${v===0?' zero':''}">${v===0?'—':v.toLocaleString()}</td>`;
    }).join('');
    return `<tr><td>${esc(row.productCode)}</td><td>${esc(row.productName)}</td><td>${esc(row.workType)}</td><td class="r" style="font-weight:600">${row.total.toLocaleString()}</td>${wCells}</tr>`;
  }).join('') || noDataRow(colCount);
  return `<div class="rpt-block">
    <div class="rpt-title" onclick="toggleBlock(this)"><span class="toggle-arrow">▼</span>④ 品號品名彙總（含各週細項，依數量降冪）</div>
    <div class="rpt-wrap"><table class="rpt">
      <thead><tr><th>品號</th><th>品名</th><th>作業類型</th><th class="r">數量合計</th>${thCols}</tr></thead>
      <tbody>${body}</tbody>
    </table></div></div>`;
}

// ④ 周報：日別細項（依日期範圍，每天一欄）
function buildBlock4Weekly(data, startDate, endDate) {
  const dates = [];
  let cur = startDate;
  while (cur <= endDate) { dates.push(cur); cur = addDays(cur, 1); }

  const map = {};
  data.forEach(r => {
    const key = `${r.productCode}\0${r.productName}\0${r.workType}`;
    if (!map[key]) {
      map[key] = {productCode:r.productCode, productName:r.productName, workType:r.workType, total:0, byDate:{}};
      dates.forEach(d => map[key].byDate[d] = 0);
    }
    map[key].total += r.qty;
    if (map[key].byDate[r.date] !== undefined) map[key].byDate[r.date] += r.qty;
  });
  const rows = Object.values(map).sort((a,b) => b.total-a.total);
  const thCols = dates.map(d => `<th class="r">${dateLabel(d)}</th>`).join('');
  const colCount = 4 + dates.length;
  const body = rows.map(row => {
    const dCells = dates.map(d => {
      const v = row.byDate[d];
      return `<td class="r${v===0?' zero':''}">${v===0?'—':v.toLocaleString()}</td>`;
    }).join('');
    return `<tr><td>${esc(row.productCode)}</td><td>${esc(row.productName)}</td><td>${esc(row.workType)}</td><td class="r" style="font-weight:600">${row.total.toLocaleString()}</td>${dCells}</tr>`;
  }).join('') || noDataRow(colCount);
  return `<div class="rpt-block">
    <div class="rpt-title" onclick="toggleBlock(this)"><span class="toggle-arrow">▼</span>④ 品號品名彙總（含各日細項，依數量降冪）</div>
    <div class="rpt-wrap"><table class="rpt">
      <thead><tr><th>品號</th><th>品名</th><th>作業類型</th><th class="r">數量合計</th>${thCols}</tr></thead>
      <tbody>${body}</tbody>
    </table></div></div>`;
}

function noDataRow(cols) {
  return `<tr><td colspan="${cols}" class="no-data">無資料</td></tr>`;
}

// ── 圖表 ──
function groupSum(data, key) {
  const map = {};
  data.forEach(r => { map[r[key]] = (map[r[key]] || 0) + r.qty; });
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]);
  return { labels: entries.map(e=>e[0]), values: entries.map(e=>e[1]) };
}

function groupMonthly(data) {
  const map = {};
  data.forEach(r => { if (!r.month) return; map[r.month] = (map[r.month] || 0) + r.qty; });
  const months = Object.keys(map).sort((a,b) => Number(a)-Number(b));
  return { labels: months.map(m => m+'月'), values: months.map(m => map[m]) };
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function drawBar(id, {labels, values}, label, colors) {
  destroyChart(id);
  charts[id] = new Chart(document.getElementById(id), {
    type: 'bar',
    data: { labels, datasets: [{ label, data: values, backgroundColor: colors.slice(0, labels.length), borderRadius: 4 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision:0 } } } }
  });
}

function drawPie(id, {labels, values}, colors) {
  destroyChart(id);
  charts[id] = new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length) }] },
    options: { plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
  });
}

function drawLine(id, {labels, values}) {
  destroyChart(id);
  charts[id] = new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels, datasets: [{ label: '數量', data: values, borderColor: '#4285f4', backgroundColor: 'rgba(66,133,244,0.1)', fill: true, tension: 0.3, pointRadius: 4 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision:0 } } } }
  });
}
