<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數量統計表 — 主管儀表板</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
  #login-screen h1 { font-size: 1.6rem; color: #1a73e8; }
  #login-screen p { color: #666; font-size: 0.9rem; }
  #login-error { color: #d93025; font-size: 0.85rem; display: none; }
  #dashboard { display: none; }
  header { background: #1a73e8; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.2rem; }
  header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
  header img { width: 32px; height: 32px; border-radius: 50%; }
  #btn-logout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .filter-bar { background: #fff; padding: 12px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #e0e0e0; }
  .filter-bar label { font-size: 0.85rem; color: #666; }
  .filter-bar select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
  #btn-refresh { margin-left: auto; background: #1a73e8; color: #fff; border: none; padding: 7px 18px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  #loading { font-size: 0.8rem; color: #1a73e8; display: none; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; padding: 20px 24px; }
  .kpi-card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
  .kpi-card .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
  .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #1a73e8; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; padding: 0 24px 24px; }
  .chart-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .chart-card h3 { font-size: 0.95rem; color: #555; margin-bottom: 16px; }
  .chart-card canvas { max-height: 280px; }
</style>
</head>
<body>
<div id="login-screen">
  <h1>數量統計表 主管儀表板</h1>
  <p>請使用公司 Google 帳號（@eup.com.tw）登入</p>
  <div id="g_id_onload" data-client_id="49182385706-hk1m4hqvlb224df35bbast88kk1baphq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-locale="zh-TW"></div>
  <p id="login-error">❌ 僅限 @eup.com.tw 帳號存取</p>
</div>
<div id="dashboard">
  <header>
    <h1>數量統計表 主管儀表板</h1>
    <div class="user-info"><img id="user-avatar" src="" alt=""><span id="user-name"></span><button id="btn-logout" onclick="logout()">登出</button></div>
  </header>
  <div class="filter-bar">
    <label>月份 <select id="filter-month"><option value="">全部</option></select></label>
    <label>人員 <select id="filter-person"><option value="">全部</option></select></label>
    <label>作業類型 <select id="filter-worktype"><option value="">全部</option></select></label>
    <button id="btn-refresh" onclick="loadData()">重新整理</button>
    <span id="loading">載入中…</span>
  </div>
  <div class="kpi-row">
    <div class="kpi-card"><div class="label">總筆數</div><div class="value" id="kpi-total">—</div></div>
    <div class="kpi-card"><div class="label">總數量</div><div class="value" id="kpi-qty">—</div></div>
    <div class="kpi-card"><div class="label">人員數</div><div class="value" id="kpi-persons">—</div></div>
    <div class="kpi-card"><div class="label">作業類型數</div><div class="value" id="kpi-wtypes">—</div></div>
    <div class="kpi-card"><div class="label">最後更新</div><div class="value" style="font-size:1rem" id="kpi-updated">—</div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><h3>各人員產出（數量）</h3><canvas id="chart-person"></canvas></div>
    <div class="chart-card"><h3>作業類型分布</h3><canvas id="chart-worktype"></canvas></div>
    <div class="chart-card"><h3>每月趨勢</h3><canvas id="chart-monthly"></canvas></div>
    <div class="chart-card"><h3>品項類型分布</h3><canvas id="chart-itemtype"></canvas></div>
  </div>
</div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxGchUIstRTZJY9Auka_K9CAfGpx6a5MoiPC2bIQfHkhMBSy1pwHlvflzbSBY3DDSsZ/exec';
const ALLOWED_DOMAIN='eup.com.tw';
let allData=[],charts={};
function handleCredentialResponse(r){const p=parseJwt(r.credential),e=p.email||'';if(!e.endsWith('@'+ALLOWED_DOMAIN)){document.getElementById('login-error').style.display='block';return;}document.getElementById('user-name').textContent=p.name;document.getElementById('user-avatar').src=p.picture;document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';loadData();}
function parseJwt(t){const b=t.split('.')[1].replace(/-/g,'+').replace(\/_/g,'/');return JSON.parse(decodeURIComponent(atob(b).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));}
function logout(){document.getElementById('dashboard').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('login-error').style.display='none';}
async function loadData(){document.getElementById('loading').style.display='inline';document.getElementById('btn-refresh').disabled=true;try{const res=await fetch(GAS_URL),json=await res.json();if(!json.success)throw new Error(json.error);allData=json.data.map(r=>({date:String(r['日期']||'').substring(0,10),month:String(r['月份']||''),person:String(r['人員']||''),workType:String(r['作業類型']||''),itemType:String(r['品項類型']||''),qty:Number(r['數量'])||0})).filter(r=>r.date);populateFilters();render();document.getElementById('kpi-updated').textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}catch(e){alert('載入失敗：'+e.message);}finally{document.getElementById('loading').style.display='none';document.getElementById('btn-refresh').disabled=false;}}
function populateFilters(){fillSelect('filter-month',[...new Set(allData.map(r=>r.month).filter(Boolean))].sort(),m=>m+'月');fillSelect('filter-person',[...new Set(allData.map(r=>r.person).filter(Boolean))].sort());fillSelect('filter-worktype',[...new Set(allData.map(r=>r.workType).filter(Boolean))].sort());}
function fillSelect(id,vals,fn){const s=document.getElementById(id),c=s.value;s.innerHTML='<option value="">全部</option>';vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=fn?fn(v):v;s.appendChild(o);});s.value=c;}
function getFiltered(){const m=document.getElementById('filter-month').value,p=document.getElementById('filter-person').value,w=document.getElementById('filter-worktype').value;return allData.filter(r=>(!m||r.month===m)&&(!p||r.person===p)&&(!w||r.workType===w));}
function render(){const d=getFiltered();document.getElementById('kpi-total').textContent=d.length.toLocaleString();document.getElementById('kpi-qty').textContent=d.reduce((s,r)=>s+r.qty,0).toLocaleString();document.getElementById('kpi-persons').textContent=new Set(d.map(r=>r.person)).size;document.getElementById('kpi-wtypes').textContent=new Set(d.map(r=>r.workType)).size;drawBar('chart-person',groupSum(d,'person'),'數量',C10);drawPie('chart-worktype',groupSum(d,'workType'),C10);drawLine('chart-monthly',groupMonthly(d));drawPie('chart-itemtype',groupSum(d,'itemType'),C6);}
['filter-month','filter-person','filter-worktype'].forEach(id=>document.getElementById(id).addEventListener('change',render));
const C10=['#4285f4','#ea4335','#fbbc04','#34a853','#ff6d00','#46bdc6','#9c27b0','#e91e63','#00bcd4','#8bc34a'],C6=['#4285f4','#34a853','#fbbc04','#ea4335','#9c27b0','#ff6d00'];
function groupSum(d,k){const m={};d.forEach(r=>{m[r[k]]=(m[r[k]]||0)+r.qty;});const e=Object.entries(m).sort((a,b)=>b[1]-a[1]);return{labels:e.map(x=>x[0]),values:e.map(x=>x[1])};}
function groupMonthly(d){const m={};d.forEach(r=>{if(!r.month)return;m[r.month]=(m[r.month]||0)+r.qty;});const k=Object.keys(m).sort((a,b)=>Number(a)-Number(b));return{labels:k.map(x=>x+'月'),values:k.map(x=>m[x])};}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function drawBar(id,{labels,values},label,colors){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{label,data:values,backgroundColor:colors.slice(0,labels.length),borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});}
function drawPie(id,{labels,values},colors){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors.slice(0,labels.length)}]},options:{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}}); }
function drawLine(id,{labels,values}){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label:'數量',data:values,borderColor:'#4285f4',backgroundColor:'rgba(66,133,244,0.1)',fill:true,tension:0.3,pointRadius:4}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});}
</script>
</body>
</html>
